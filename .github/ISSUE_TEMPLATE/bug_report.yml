name: Bug report
description: Report a reproducible problem in plist.ts
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Share the smallest plist, code sample, or steps that reproduce the problem.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include package version, Node.js version, and any relevant tooling details.
